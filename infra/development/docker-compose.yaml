version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tennisleague
      POSTGRES_USER: tennisleague
      POSTGRES_PASSWORD: tennisleague
    ports:
      - "5432:5432"
    volumes:
      - tennis-league-postgres_data:/var/lib/postgresql/data
      - ../init:/docker-entrypoint-initdb.d
    networks:
      - tennis-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tennisleague -d tennisleague" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - tennis-league-redis_data:/data
    networks:
      - tennis-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-ui:
    image: redis/redisinsight:latest
    container_name: redis-ui
    restart: unless-stopped
    ports:
      - "5540:5540"
    networks:
      - tennis-net
    depends_on:
      - redis

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - tennis-net

  schema-initializer:
    build:
      context: ./migrations
      dockerfile: Dockerfile
    image: berkerturan/tennis-league-schema-initializer
    container_name: schema-initializer
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tennis-net
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=tennisleague
      - POSTGRES_PASSWORD=tennisleague
      - POSTGRES_DB=tennisleague
      - POSTGRES_SSLMODE=disable

volumes:
  tennis-league-postgres_data:
  tennis-league-redis_data:
  rabbitmq_data:

networks:
  tennis-net:
    driver: bridge