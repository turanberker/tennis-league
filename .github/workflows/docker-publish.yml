name: Publish Docker Images

on:
  push:
    tags:
      - 'v*' # Sadece v1, v1.0.2 gibi tag'lerde tetiklenir
    branches:
      - main # Sadece main branch'i üzerindeki olaylara bakar


jobs:
  push_to_registry:
    name: Build and Push All Images
    runs-on: ubuntu-latest
    # KRİTİK KONTROL: Sadece tag push edildiyse çalış (Normal push'larda çalışma)
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Backend: API Image
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend/service
          file: ./backend/service/Dockerfile
          build-args: |
            APP_NAME=api
          push: true
          tags: |
            berkerturan/tennis-league-api:latest
            berkerturan/tennis-league-api:${{ github.ref_name }}

      # 2. Backend: Scheduler Image
      - name: Build and push Scheduler
        uses: docker/build-push-action@v5
        with:
          context: ./backend/service
          file: ./backend/service/Dockerfile
          build-args: |
            APP_NAME=publisher
          push: true
          tags: |
            berkerturan/tennis-league-scheduler:latest
            berkerturan/tennis-league-scheduler:${{ github.ref_name }}

      # 3. Backend: Consumer Image
      - name: Build and push Consumer
        uses: docker/build-push-action@v5
        with:
          context: ./backend/service
          file: ./backend/service/Dockerfile
          build-args: |
            APP_NAME=consumer
          push: true
          tags: |
            berkerturan/tennis-league-consumer:latest
            berkerturan/tennis-league-consumer:${{ github.ref_name }}

      # 4. Frontend Image
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/tennis-league
          file: ./frontend/tennis-league/Dockerfile
          push: true
          tags: |
            berkerturan/tennis-league-ui:latest
            berkerturan/tennis-league-ui:${{ github.ref_name }}

      # 5. Migrate Image
      - name: Build and push Migrate
        uses: docker/build-push-action@v5
        with:
          context: ./infra/development/migrations
          file: ./Dockerfile.migrate
          push: true
          tags: |
            berkerturan/tennis-league-migrate:latest
            berkerturan/tennis-league-migrate:${{ github.ref_name }}