name: Publish Docker Images

on:
  push:
    tags:
      - 'v*' # Sadece v ile başlayan tag'lerde tetiklenir (Örn: v1.0.2)
  workflow_dispatch: # MANUEL TETİKLEME
    inputs:
      version_tag:
        description: 'Docker imajı için etiket (latest dışında)'
        required: true
        default: 'manual'

jobs:
  push_to_registry:
    name: Build and Push All Images
    runs-on: ubuntu-latest
    # Manuel tetiklendiyse VEYA tag v ile başlıyorsa çalış
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      # Versiyon belirleme mantığı:
      # Manuel tetiklendiyse input'u al, tag ile çalıştıysa tag ismini al.
      - name: Set Version Tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Backend: API Image
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend/service
          file: ./backend/service/Dockerfile
          build-args: |
            APP_NAME=api
          push: true
          tags: |
            berkerturan/tennis-league-api:latest
            berkerturan/tennis-league-api::${{ steps.vars.outputs.tag }}

      # 2. Backend: Scheduler Image
      - name: Build and push Scheduler
        uses: docker/build-push-action@v5
        with:
          context: ./backend/service
          file: ./backend/service/Dockerfile
          build-args: |
            APP_NAME=publisher
          push: true
          tags: |
            berkerturan/tennis-league-scheduler:latest
            berkerturan/tennis-league-scheduler::${{ steps.vars.outputs.tag }}

      # 3. Backend: Consumer Image
      - name: Build and push Consumer
        uses: docker/build-push-action@v5
        with:
          context: ./backend/service
          file: ./backend/service/Dockerfile
          build-args: |
            APP_NAME=consumer
          push: true
          tags: |
            berkerturan/tennis-league-consumer:latest
            berkerturan/tennis-league-consumer::${{ steps.vars.outputs.tag }}

      # 4. Frontend: UI-Docker
      - name: Build and push Frontend Docker
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/tennis-league
          file: ./frontend/tennis-league/Dockerfile
          build-args: |
            BUILD_MODE=build:staging
          push: true
          tags: |
            berkerturan/tennis-league-ui-docker:latest
            berkerturan/tennis-league-ui-docker::${{ steps.vars.outputs.tag }}

      # 5. Frontend: UI-Prod
      - name: Build and push Frontend Prod
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/tennis-league
          file: ./frontend/tennis-league/Dockerfile
          push: true
          tags: |
            berkerturan/tennis-league-ui-prod:latest
            berkerturan/tennis-league-ui-prod::${{ steps.vars.outputs.tag }}

      # 6. Migrate Image
      - name: Build and push Migrate
        uses: docker/build-push-action@v5
        with:
          context: ./infra/development/migrations
          file: ./infra/development/migrations/Dockerfile
          push: true
          tags: |
            berkerturan/tennis-league-migrate:latest
            berkerturan/tennis-league-migrate::${{ steps.vars.outputs.tag }}

      # --- SSH DEPLOY ADIMI (Sunucuyu güncellemek için) ---
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        if: success() # Sadece build'ler başarılıysa çalışır
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/amateur-tennis-league-deployment/docker
            docker compose up -d
