name: Publish Docker Images

on:
  push:
    tags:
      - 'v*' # Sadece v ile başlayan tag'lerde tetiklenir (Örn: v1.0.2)
  workflow_dispatch: # MANUEL TETİKLEME
    inputs:
      version_tag:
        description: 'Docker imajı için etiket (latest dışında)'
        required: true
        default: 'v'

jobs:
  push_to_registry:
    name: Build and Push All Images
    runs-on: ubuntu-latest
    # Manuel tetiklendiyse VEYA tag v ile başlıyorsa çalış
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      # Versiyon belirleme mantığı:
      # Manuel tetiklendiyse input'u al, tag ile çalıştıysa tag ismini al.
      - name: Set Version Tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Backend: API Image
      - name: Build and Push Main API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: main-api # Dockerfile'daki ilgili target
          push: true
          tags: |
            berkerturan/tennis-league-main-api:latest
            berkerturan/tennis-league-main-api:${{ steps.vars.outputs.tag }}

      # 2. Backend: Main Comsumer Image
      - name: Build and Push Main Consumer
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: main-consumer
          push: true
          tags: |
            berkerturan/tennis-league-main-consumer:latest
            berkerturan/tennis-league-main-consumer:${{ steps.vars.outputs.tag }}

      # 3. Backend: Main Comsumer Image
      - name: Build and Push Main Publisher
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: main-publisher
          push: true
          tags: |
            berkerturan/tennis-league-main-publisher:latest
            berkerturan/tennis-league-main-publisher:${{ steps.vars.outputs.tag }}

      # 4. Backend: User Service Image
      - name: Build and Push User API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: user-api
          push: true
          tags: |
            berkerturan/tennis-league-user-api:latest
            berkerturan/tennis-league-user-api:${{ steps.vars.outputs.tag }}
            

      # 5. Backend: User Comsumer Image
      - name: Build and Push User Consumer
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: user-consumer
          push: true
          tags: |
            berkerturan/tennis-league-user-consumer:latest
            berkerturan/tennis-league-user-consumer:${{ steps.vars.outputs.tag }}

      # 6. Frontend: UI-Docker
      - name: Build and push Frontend Docker
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/tennis-league
          file: ./frontend/tennis-league/Dockerfile
          build-args: |
            BUILD_MODE=build:staging
          push: true
          tags: |
            berkerturan/tennis-league-ui-docker:latest
            berkerturan/tennis-league-ui-docker:${{ steps.vars.outputs.tag }}

      # 7. Frontend: UI-Prod
      - name: Build and push Frontend Prod
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/tennis-league
          file: ./frontend/tennis-league/Dockerfile
          push: true
          tags: |
            berkerturan/tennis-league-ui-prod:latest
            berkerturan/tennis-league-ui-prod:${{ steps.vars.outputs.tag }}


      # 8. Migrate Image
      - name: Build and push Migrate
        uses: docker/build-push-action@v5
        with:
          context: ./infra/development/migrations
          file: ./infra/development/migrations/Dockerfile
          push: true
          tags: |
            berkerturan/tennis-league-migrate:latest
            berkerturan/tennis-league-migrate:${{ steps.vars.outputs.tag }}

      # --- SSH DEPLOY ADIMI (Sunucuyu güncellemek için) ---
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        if: success() # Sadece build'ler başarılıysa çalışır
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/amateur-tennis-league-deployment/docker
            docker compose up -d
