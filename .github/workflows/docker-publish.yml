name: Publish Docker Images

on:
  push:
    tags:
      - 'v*' # v1.0.2 gibi tag'lerde tetiklenir
    branches:
      - main
  workflow_dispatch: # MANUEL TETİKLEME İÇİN GEREKLİ
    inputs:
      inputs:
        version_tag:
          description: 'Docker imajı için etiket (Örn: v1.0.2 veya manual-fix)'
          required: true
          default: 'latest'

jobs:
  push_to_registry:
    name: Build and Push All Images
    runs-on: ubuntu-latest
    # Manuel tetiklendiyse VEYA tag v ile başlıyorsa çalış
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Backend: API Image
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend/service
          file: ./backend/service/Dockerfile
          build-args: |
            APP_NAME=api
          push: true
          tags: |
            berkerturan/tennis-league-api:latest
            berkerturan/tennis-league-api:${{ github.event.inputs.manual_tag || github.ref_name }}

      # 2. Backend: Scheduler Image
      - name: Build and push Scheduler
        uses: docker/build-push-action@v5
        with:
          context: ./backend/service
          file: ./backend/service/Dockerfile
          build-args: |
            APP_NAME=publisher
          push: true
          tags: |
            berkerturan/tennis-league-scheduler:latest
            berkerturan/tennis-league-scheduler:${{ github.event.inputs.manual_tag || github.ref_name }}

      # 3. Backend: Consumer Image
      - name: Build and push Consumer
        uses: docker/build-push-action@v5
        with:
          context: ./backend/service
          file: ./backend/service/Dockerfile
          build-args: |
            APP_NAME=consumer
          push: true
          tags: |
            berkerturan/tennis-league-consumer:latest
            berkerturan/tennis-league-consumer:${{ github.event.inputs.manual_tag || github.ref_name }}

      # 4. Frontend: UI-Docker
      - name: Build and push Frontend Docker
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/tennis-league
          file: ./frontend/tennis-league/Dockerfile
          build-args: |
            BUILD_MODE=build:staging
          push: true
          tags: |
            berkerturan/tennis-league-ui-docker:latest
            berkerturan/tennis-league-ui-docker:${{ github.event.inputs.manual_tag || github.ref_name }}

      # 5. Frontend: UI-Prod
      - name: Build and push Frontend Prod
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/tennis-league
          file: ./frontend/tennis-league/Dockerfile
          push: true
          tags: |
            berkerturan/tennis-league-ui-prod:latest
            berkerturan/tennis-league-ui-prod:${{ github.event.inputs.manual_tag || github.ref_name }}

      # 6. Migrate Image
      - name: Build and push Migrate
        uses: docker/build-push-action@v5
        with:
          context: ./infra/development/migrations
          file: ./infra/development/migrations/Dockerfile
          push: true
          tags: |
            berkerturan/tennis-league-migrate:latest
            berkerturan/tennis-league-migrate:${{ github.event.inputs.manual_tag || github.ref_name }}